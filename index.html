<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Picker</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJkZWZhdWx0X2xvY2FsZSI6ICJlbiIsCiAgIm5hbWUiOiAiTmFtZSBQaWNrZXIiLAogICJzaG9ydF9uYW1lIjogIlBpY2tlciIsCiAgImRlc2NyaXB0aW9uIjogIkEgY2xhc3Nyb29tIHdoZWVsIHBpY2tlciIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjRkNTRmIiwKICAidGhlbWVfY29sb3ciOiAiIzM0OThkYiIKfQ==">
    
    <style>
        :root {
            --primary: #3498db;
            --dark: #2c3e50;
            --success: #2ecc71;
            --error: #e74c3c;
            --gray: #ecf0f1;
            --white: #ffffff;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
            --bg-app: #f0f2f5;
            --sidebar-border: #eeeeee;
            --item-bg: #fafafa;
        }

        body.dark-mode {
            --dark: #ecf0f1;
            --white: #2c2c2c;
            --text-main: #f0f2f5;
            --text-light: #bdc3c7;
            --bg-app: #1a1a1a;
            --sidebar-border: #444444;
            --item-bg: #1e1e1e;
            --gray: #3d3d3d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 10px;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
        }

        .container {
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            width: 100%;
            height: 100%;
            max-width: 1200px;
            display: flex;
            overflow: hidden;
            box-sizing: border-box;
            position: relative;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px;
            min-width: 300px;
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column; 
            height: 100%;
            max-height: 100%; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 1.5rem;
            box-sizing: border-box;
            background: var(--white);
            z-index: 500;
        }

        .sidebar.collapsed { width: 0; min-width: 0; padding: 0; border: none; opacity: 0; pointer-events: none; }

        .mobile-close-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--text-light);
            cursor: pointer;
            line-height: 1;
            padding: 0;
            margin-top: -5px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                box-shadow: 5px 0 25px rgba(0,0,0,0.3);
                transform: translateX(0);
                z-index: 1000; /* Force above the toggle button */
            }
            .sidebar.collapsed {
                transform: translateX(-100%);
                opacity: 0;
            }
            .mobile-close-btn { display: block; } /* Show close button on mobile */
        }

        .sidebar-header { flex-shrink: 0; }
        .header-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .sidebar-header h2 { margin: 0; font-size: 1.4rem; }
        .directions { font-size: 0.8rem; color: var(--text-light); margin-bottom: 10px; }
        
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        input[type="text"] {
            padding: 12px; border: 2px solid var(--gray);
            border-radius: 8px; outline: none; font-size: 1rem;
            background: var(--item-bg); color: var(--text-main);
        }
        
        .add-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .list-container { 
            flex: 1 1 0; 
            overflow-y: auto; 
            border: 1px solid var(--gray); 
            border-radius: 12px; 
            background: var(--item-bg);
            margin-bottom: 15px;
        }

        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--sidebar-border); }

        .sidebar-footer { flex-shrink: 0; padding-top: 10px; border-top: 1px solid var(--sidebar-border); }
        .backup-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .backup-btn { flex: 1; font-size: 0.75rem; padding: 8px; cursor: pointer; background: var(--gray); border: 1px solid var(--sidebar-border); border-radius: 6px; color: var(--text-main); font-weight: 600; }

        /* --- WHEEL BOX --- */
        .wheel-box { 
            flex: 1;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100%;
            min-width: 0;
            overflow-y: auto;
            padding: 1.5rem;
            box-sizing: border-box;
            position: relative;
        }

        .wheel-header { text-align: center; margin-bottom: 20px; flex-shrink: 0; }
        .wheel-header h1 { margin: 0; color: var(--text-main); font-size: 1.6rem; }

        .controls-row { position: absolute; top: 15px; left: 15px; z-index: 200; }
        .toggle-btn { background: var(--dark); color: var(--white); border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        
        .canvas-wrapper { 
            position: relative; 
            width: 100%;
            max-width: min(500px, 60vh);
            aspect-ratio: 1 / 1; 
            flex-shrink: 0;
            margin: auto 0;
        }
        
        #wheelCanvas {
            width: 100%; 
            height: 100%; 
            border-radius: 50%;
            transition: transform 10s cubic-bezier(0.1, 0, 0.1, 1);
            border: 8px solid var(--white);
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        .arrow {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent;
            border-right: 15px solid transparent; border-top: 30px solid var(--error);
            z-index: 110;
        }

        #spinBtn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border-radius: 50%; background: var(--dark);
            color: var(--white); border: 4px solid var(--white); font-size: 1rem;
            font-weight: bold; cursor: pointer; z-index: 150;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #spinBtn:disabled { background: #95a5a6; }

        /* WINNER UI */
        #winnerOverlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 130%; z-index: 2000; text-align: center;
            opacity: 0; transition: opacity 0.5s ease; pointer-events: none; 
            display: flex; justify-content: center; align-items: center;
        }
        #winnerOverlay.show { opacity: 1; pointer-events: auto; }
        #winnerName {
            display: inline-block; background: var(--white);
            padding: 20px 40px; border-radius: 50px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900; color: var(--success);
            cursor: pointer; animation: celebrate 0.5s infinite alternate; text-align: center;
        }

        @keyframes celebrate { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .info { font-size: 0.9rem; color: var(--text-light); text-align: center; margin-top: 20px; flex-shrink: 0; }
    </style>
</head>
<body class="light-theme">

<div class="container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="header-title-row">
                <h2>Student List</h2>
                <button class="mobile-close-btn" onclick="toggleSidebar()">&times;</button>
            </div>
            <p class="directions">Add names (comma separated). List auto-hides after 30s.</p>
            <div class="input-group">
                <input type="text" id="nameIn" placeholder="Enter name(s)..." oninput="resetSidebarTimer()">
                <button class="add-btn" onclick="addName()">Add to Wheel</button>
            </div>
        </div>
        
        <div class="list-container" id="uiList" onscroll="resetSidebarTimer()"></div>
        
        <div class="sidebar-footer">
            <div class="backup-row">
                <button class="backup-btn" onclick="exportList()">💾 Export</button>
                <button class="backup-btn" onclick="document.getElementById('fileInput').click()">📂 Import</button>
            </div>
            <div class="backup-row">
                <button class="backup-btn" onclick="toggleTheme()">🌓 Theme</button>
                <button onclick="clearAll()" style="color:var(--error); border:none; background:none; font-size:0.7rem; cursor:pointer; text-decoration:underline; flex: 1;">Clear All</button>
            </div>
        </div>
        <input type="file" id="fileInput" style="display:none" accept=".txt" onchange="importList(event)">
    </div>

    <div class="wheel-box">
        <div class="controls-row">
            <button class="toggle-btn" onclick="toggleSidebar()" onmouseover="resetSidebarTimer()">☰ List</button>
        </div>

        <div class="wheel-header">
            <h1>Random Name Picker</h1>
        </div>

        <div class="canvas-wrapper">
            <div class="arrow"></div>
            <button id="spinBtn" onclick="spin()">SPIN</button>
            <canvas id="wheelCanvas" width="1000" height="1000"></canvas>
            
            <div id="winnerOverlay" onclick="dismissWinner()">
                <div id="winnerName"></div>
            </div>
        </div>
        
        <p class="info" id="poolStatus"></p>
    </div>
</div>

<script>
    let masterList = JSON.parse(localStorage.getItem('picker_final_v15')) || [];
    let isDarkMode = localStorage.getItem('picker_theme') === 'dark';
    let pool = []; 
    let rotation = 0;
    let winnerTimer = null;
    let sidebarTimer = null;
    const colors = ['#3498db', '#9b59b6', '#e67e22', '#1abc9c', '#f1c40f', '#e74c3c', '#2c3e50'];

    const inputField = document.getElementById('nameIn');
    inputField.addEventListener("keydown", (e) => { if (e.key === "Enter") addName(); });

    function init() { 
        if (isDarkMode) document.body.classList.add('dark-mode');
        resetPool(); 
        render(); 
        resetSidebarTimer(); 
    }

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('picker_theme', isDarkMode ? 'dark' : 'light');
        draw();
    }

    function resetSidebarTimer() {
        if (sidebarTimer) clearTimeout(sidebarTimer);
        const sidebar = document.getElementById('sidebar');
        if (sidebar && sidebar.classList.contains('collapsed')) return;
        sidebarTimer = setTimeout(() => {
            if (!sidebar.classList.contains('collapsed')) toggleSidebar();
        }, 30000);
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('collapsed');
        if (!sidebar.classList.contains('collapsed')) resetSidebarTimer();
        setTimeout(draw, 450);
    }

    function addName() {
        const rawInput = inputField.value.trim();
        if (!rawInput) return;
        rawInput.split(',').forEach(name => {
            if (name.trim()) masterList.push({ name: name.trim(), active: true });
        });
        inputField.value = ''; resetPool(); render(); resetSidebarTimer();
    }

    function toggleActive(idx) { masterList[idx].active = !masterList[idx].active; resetPool(); render(); resetSidebarTimer(); }
    function remove(idx) { masterList.splice(idx, 1); resetPool(); render(); resetSidebarTimer(); }
    function clearAll() { if(confirm("Clear all names?")) { masterList = []; resetPool(); render(); resetSidebarTimer(); } }
    
    function exportList() {
        if(masterList.length === 0) return alert("List is empty!");
        const names = masterList.map(s => s.name).join(', ');
        const blob = new Blob([names], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "student_list.txt";
        a.click();
    }

    function importList(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            if (content) {
                const names = content.split(',');
                names.forEach(n => { if (n.trim()) masterList.push({ name: n.trim(), active: true }); });
                resetPool(); render();
            }
        };
        reader.readAsText(file);
        event.target.value = "";
    }

    function resetPool() { pool = masterList.filter(s => s.active).map(s => s.name); }

    function render() {
        const listUI = document.getElementById('uiList');
        listUI.innerHTML = '';
        masterList.forEach((s, i) => {
            listUI.innerHTML += `<div class="student-item"><span><input type="checkbox" ${s.active ? 'checked' : ''} onchange="toggleActive(${i})"> <span style="text-decoration: ${s.active ? 'none' : 'line-through'}; margin-left: 8px;">${s.name}</span></span><button style="border:none; background:none; color:var(--error); font-size: 1.2rem; cursor:pointer;" onclick="remove(${i})">&times;</button></div>`;
        });
        localStorage.setItem('picker_final_v15', JSON.stringify(masterList));
        draw();
        document.getElementById('poolStatus').innerText = `Unpicked: ${pool.length} | Active Total: ${masterList.filter(s => s.active).length}`;
    }

    function draw() {
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const activeNames = masterList.filter(s => s.active);
        const center = canvas.width / 2;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        if(activeNames.length === 0) return;
        const sliceAngle = (Math.PI * 2) / activeNames.length;
        activeNames.forEach((s, i) => {
            const angle = i * sliceAngle;
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath(); ctx.moveTo(center, center); ctx.arc(center, center, center - 10, angle, angle + sliceAngle); ctx.fill();
            ctx.strokeStyle = isDarkMode ? "#2c2c2c" : "white"; ctx.lineWidth = 4; ctx.stroke();
            ctx.save(); ctx.translate(center, center); ctx.rotate(angle + sliceAngle / 2);
            ctx.textAlign = "right"; ctx.fillStyle = "white";
            let baseSize = 48; const maxTextWidth = center - 130; ctx.font = `bold ${baseSize}px Arial`;
            while (ctx.measureText(s.name).width > maxTextWidth && baseSize > 14) { baseSize -= 2; ctx.font = `bold ${baseSize}px Arial`; }
            if (activeNames.length > 15 && baseSize > 24) baseSize = 24;
            ctx.font = `bold ${baseSize}px Arial`;
            ctx.fillText(s.name, center - 80, baseSize / 3);
            ctx.restore();
        });
    }

    function dismissWinner() {
        document.getElementById('winnerOverlay').classList.remove('show');
        if (winnerTimer) clearTimeout(winnerTimer);
    }

    function spin() {
        const activeNames = masterList.filter(s => s.active).map(s => s.name);
        if(activeNames.length === 0) return;
        if(pool.length === 0) resetPool();
        const btn = document.getElementById('spinBtn');
        const overlay = document.getElementById('winnerOverlay');
        const winnerNameDiv = document.getElementById('winnerName');
        btn.disabled = true; overlay.classList.remove('show');
        const winnerIndex = Math.floor(Math.random() * pool.length);
        const winnerName = pool[winnerIndex];
        const visualPos = activeNames.indexOf(winnerName);
        const degPerSlice = 360 / activeNames.length;
        const landing = 270 - (visualPos * degPerSlice) - (degPerSlice / 2);
        rotation += (360 * 8) + (landing - (rotation % 360));
        document.getElementById('wheelCanvas').style.transform = `rotate(${rotation}deg)`;
        setTimeout(() => {
            pool.splice(winnerIndex, 1);
            winnerNameDiv.innerText = `✨ ${winnerName} ✨`;
            overlay.classList.add('show');
            btn.disabled = false;
            render();
            winnerTimer = setTimeout(dismissWinner, 15000);
        }, 10000); 
    }

    init();
    window.addEventListener('resize', draw);
</script>

</body>
</html>
