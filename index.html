<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Picker Pro</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJkZWZhdWx0X2xvY2FsZSI6ICJlbiIsCiAgIm5hbWUiOiAiU3R1ZGVudCBQaWNrZXIiLAogICJzaG9ydF9uYW1lIjogIlBpY2tlciIsCiAgImRlc2NyaXB0aW9uIjogIkEgY2xhc3Nyb29tIHdoZWVsIHBpY2tlciIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjRkNTRmIiwKICAidGhlbWVfY29sb3ciOiAiIzM0OThkYiIKfQ==">
    
    <style>
        :root {
            --primary: #3498db;
            --dark: #2c3e50;
            --success: #2ecc71;
            --error: #e74c3c;
            --gray: #ecf0f1;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.1);
            width: 100%;
            height: 100%;
            max-width: 1200px;
            display: flex;
            gap: 30px;
            box-sizing: border-box;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            min-width: 300px;
            border-right: 1px solid #eee;
            padding-right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .sidebar.collapsed { width: 0; min-width: 0; padding: 0; margin: 0; border: none; opacity: 0; pointer-events: none; }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input[type="text"] {
            padding: 12px; border: 2px solid var(--gray);
            border-radius: 8px; outline: none; font-size: 1rem;
        }
        
        .add-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .list-container { flex-grow: 1; overflow-y: auto; border: 1px solid var(--gray); border-radius: 12px; background: #fafafa; }

        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }

        /* Wheel Section */
        .wheel-box { 
            flex: 1;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            position: relative;
            height: 100%;
            min-width: 0;
        }

        .controls-row { position: absolute; top: 0; left: 0; z-index: 200; display: flex; gap: 10px; }
        .toggle-btn { background: var(--dark); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .canvas-wrapper { 
            position: relative; 
            height: 70vh;
            width: 70vh;
            max-width: 100%;
            aspect-ratio: 1 / 1; 
        }
        
        #wheelCanvas {
            width: 100%; height: 100%; border-radius: 50%;
            transition: transform 10s cubic-bezier(0.1, 0, 0.1, 1); /* 10s SPIN TIME */
            border: 10px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        .arrow {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 20px solid transparent;
            border-right: 20px solid transparent; border-top: 40px solid var(--error);
            z-index: 100; filter: drop-shadow(0 4px 2px rgba(0,0,0,0.2));
        }

        #spinBtn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90px; height: 90px; border-radius: 50%; background: var(--dark);
            color: white; border: 5px solid white; font-size: 1.1rem;
            font-weight: bold; cursor: pointer; z-index: 150;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #spinBtn:disabled { background: #95a5a6; }

        /* --- CENTERED WINNER OVERLAY --- */
        #winnerOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            z-index: 300;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none; 
        }

        #winnerOverlay.show { opacity: 1; pointer-events: auto; }

        #winnerName {
            display: inline-block;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 40px;
            border-radius: 50px;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
            font-size: clamp(2.5rem, 8vh, 5rem);
            font-weight: 900;
            color: var(--success);
            cursor: pointer; /* Indicates it can be clicked to dismiss */
            animation: celebrate 0.5s infinite alternate;
        }

        @keyframes celebrate { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .info { position: absolute; bottom: 0; font-size: 0.9rem; color: #7f8c8d; }
        .backup-controls { display: flex; flex-wrap: wrap; gap: 5px; justify-content: space-between; margin-top: 10px; }
        .backup-btn { font-size: 0.7rem; padding: 5px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar" id="sidebar">
        <h2>Student List</h2>
        <div class="input-group">
            <input type="text" id="nameIn" placeholder="Enter name(s)...">
            <button class="add-btn" onclick="addName()">Add to Wheel</button>
        </div>
        <div class="list-container" id="uiList"></div>
        
        <div class="backup-controls">
            <button class="backup-btn" onclick="exportList()">💾 Export</button>
            <button class="backup-btn" onclick="document.getElementById('fileInput').click()">📂 Import</button>
            <button onclick="clearAll()" style="color:var(--error); border:none; background:none; font-size:0.75rem; cursor:pointer; text-decoration:underline;">Clear All</button>
        </div>
        <input type="file" id="fileInput" style="display:none" accept=".txt" onchange="importList(event)">
    </div>

    <div class="wheel-box">
        <div class="controls-row">
            <button class="toggle-btn" onclick="toggleSidebar()">☰ Toggle List</button>
        </div>

        <div id="winnerOverlay" onclick="dismissWinner()">
            <div id="winnerName"></div>
        </div>

        <div class="canvas-wrapper">
            <div class="arrow"></div>
            <button id="spinBtn" onclick="spin()">SPIN</button>
            <canvas id="wheelCanvas" width="1000" height="1000"></canvas>
        </div>
        
        <p class="info" id="poolStatus"></p>
    </div>
</div>

<script>
    let masterList = JSON.parse(localStorage.getItem('picker_vFinal_v3')) || [];
    let pool = []; 
    let rotation = 0;
    let winnerTimer = null; // Track the auto-hide timer
    const colors = ['#3498db', '#9b59b6', '#e67e22', '#1abc9c', '#f1c40f', '#e74c3c', '#2c3e50'];

    const inputField = document.getElementById('nameIn');
    inputField.addEventListener("keydown", (e) => { if (e.key === "Enter") addName(); });

    function init() { resetPool(); render(); }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
        setTimeout(draw, 450);
    }

    function addName() {
        const rawInput = inputField.value.trim();
        if (!rawInput) return;
        rawInput.split(',').forEach(name => {
            if (name.trim()) masterList.push({ name: name.trim(), active: true });
        });
        inputField.value = ''; resetPool(); render();
    }

    function toggleActive(idx) { masterList[idx].active = !masterList[idx].active; resetPool(); render(); }
    function remove(idx) { masterList.splice(idx, 1); resetPool(); render(); }
    function clearAll() { if(confirm("Clear all names?")) { masterList = []; resetPool(); render(); } }
    
    function exportList() {
        if(masterList.length === 0) return alert("List is empty!");
        const names = masterList.map(s => s.name).join(', ');
        const blob = new Blob([names], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "student_list.txt";
        a.click();
    }

    function importList(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            if (content) {
                const names = content.split(',');
                names.forEach(n => { if (n.trim()) masterList.push({ name: n.trim(), active: true }); });
                resetPool(); render();
            }
        };
        reader.readAsText(file);
        event.target.value = "";
    }

    function resetPool() { pool = masterList.filter(s => s.active).map(s => s.name); }

    function render() {
        const listUI = document.getElementById('uiList');
        listUI.innerHTML = '';
        masterList.forEach((s, i) => {
            listUI.innerHTML += `<div class="student-item"><span><input type="checkbox" ${s.active ? 'checked' : ''} onchange="toggleActive(${i})"> <span style="text-decoration: ${s.active ? 'none' : 'line-through'}">${s.name}</span></span><button style="border:none; background:none; color:red; cursor:pointer;" onclick="remove(${i})">&times;</button></div>`;
        });
        localStorage.setItem('picker_vFinal_v3', JSON.stringify(masterList));
        draw();
        document.getElementById('poolStatus').innerText = `Unpicked: ${pool.length} | Active: ${masterList.filter(s => s.active).length}`;
    }

    function draw() {
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const activeNames = masterList.filter(s => s.active);
        const center = canvas.width / 2;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        if(activeNames.length === 0) return;
        const sliceAngle = (Math.PI * 2) / activeNames.length;
        activeNames.forEach((s, i) => {
            const angle = i * sliceAngle;
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath(); ctx.moveTo(center, center); ctx.arc(center, center, center - 10, angle, angle + sliceAngle); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.stroke();
            ctx.save(); ctx.translate(center, center); ctx.rotate(angle + sliceAngle / 2);
            ctx.textAlign = "right"; ctx.fillStyle = "white";
            let baseSize = 48; const maxTextWidth = center - 130; ctx.font = `bold ${baseSize}px Arial`;
            while (ctx.measureText(s.name).width > maxTextWidth && baseSize > 14) { baseSize -= 2; ctx.font = `bold ${baseSize}px Arial`; }
            if (activeNames.length > 15 && baseSize > 24) baseSize = 24;
            ctx.font = `bold ${baseSize}px Arial`;
            ctx.fillText(s.name, center - 80, baseSize / 3);
            ctx.restore();
        });
    }

    function dismissWinner() {
        const overlay = document.getElementById('winnerOverlay');
        overlay.classList.remove('show');
        if (winnerTimer) clearTimeout(winnerTimer);
    }

    function spin() {
        const activeNames = masterList.filter(s => s.active).map(s => s.name);
        if(activeNames.length === 0) return;
        if(pool.length === 0) resetPool();
        
        const btn = document.getElementById('spinBtn');
        const overlay = document.getElementById('winnerOverlay');
        const winnerNameDiv = document.getElementById('winnerName');
        
        btn.disabled = true; 
        overlay.classList.remove('show');

        const winnerIndex = Math.floor(Math.random() * pool.length);
        const winnerName = pool[winnerIndex];
        const visualPos = activeNames.indexOf(winnerName);
        const degPerSlice = 360 / activeNames.length;
        const landing = 270 - (visualPos * degPerSlice) - (degPerSlice / 2);
        rotation += (360 * 8) + (landing - (rotation % 360));
        
        document.getElementById('wheelCanvas').style.transform = `rotate(${rotation}deg)`;

        // WAIT 10 SECONDS FOR SPIN TO FINISH
        setTimeout(() => {
            pool.splice(winnerIndex, 1);
            winnerNameDiv.innerText = `✨ ${winnerName} ✨`;
            overlay.classList.add('show');
            btn.disabled = false;
            document.getElementById('poolStatus').innerText = `Unpicked: ${pool.length} | Active: ${masterList.filter(s => s.active).length}`;

            // AUTOMATICALLY HIDE AFTER 15 SECONDS
            winnerTimer = setTimeout(dismissWinner, 15000);

        }, 10000); 
    }

    init();
    window.addEventListener('resize', draw);
</script>

</body>
</html>
